services:
  mysql:
    image: mysql:8
    container_name: social-analyzer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: social_analyzer
    # Chỉ bind vào 127.0.0.1 - MySQL không cần (và không nên) lộ ra internet,
    # Node app chạy trên cùng máy nên gọi qua localhost là đủ.
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: social-analyzer-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
